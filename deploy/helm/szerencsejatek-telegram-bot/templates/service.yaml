{{- if not .Values.knative.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "szerencsejatek-telegram-bot.fullname" . }}
  labels:
    {{- include "szerencsejatek-telegram-bot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "szerencsejatek-telegram-bot.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
{{- end }}
