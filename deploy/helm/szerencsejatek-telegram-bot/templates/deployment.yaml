{{- if not .Values.knative.enabled }}
{{- if eq .Values.workload.mode "longPolling" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "szerencsejatek-telegram-bot.fullname" . }}
  labels:
    {{- include "szerencsejatek-telegram-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "szerencsejatek-telegram-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "szerencsejatek-telegram-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: telegram
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - deno
            - run
            - --allow-net
            - --allow-env
            - --allow-read
            - --allow-write
            - --allow-ffi
            - src/telegram_bot.ts
          env:
            {{- include "szerencsejatek-telegram-bot.env" . | nindent 12 }}
          volumeMounts:
            {{- include "szerencsejatek-telegram-bot.volumeMounts" . | nindent 12 }}
          {{- with .Values.deployment.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: pipeline
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - deno
            - run
            - --allow-net
            - --allow-env
            - --allow-read
            - --allow-write
            - --allow-ffi
            - src/server.ts
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- include "szerencsejatek-telegram-bot.env" . | nindent 12 }}
          volumeMounts:
            {{- include "szerencsejatek-telegram-bot.volumeMounts" . | nindent 12 }}
          {{- with .Values.deployment.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        {{- include "szerencsejatek-telegram-bot.volumes" . | nindent 8 }}
{{- else }}
