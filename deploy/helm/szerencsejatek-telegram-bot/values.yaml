# Default image — CI publishes to ghcr.io/95gabor/szerencsejatek-telegram-bot (see repo Actions)
image:
  repository: szerencsejatek-telegram-bot
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
# Knative Service / Deployment name (also used by Trigger subscriber ref)
fullnameOverride: szerencsejatek-bot

service:
  port: 8080

# --- Workload: Knative Service (optional) or plain Deployment (default)
knative:
  enabled: false
  containerConcurrency: 10
  # imagePullPolicy Never is for local kind; use IfNotPresent for real registries
  imagePullPolicy: ""

# When knative.enabled is false:
# - longPolling: telegram_bot (long poll) + server (ClusterIP only)
# - httpServer: single server.ts (webhook / CloudEvents; enable ingress below if you need external HTTP)
# Optional CronJob (cronjob.enabled): POSTs draw check to server.ts on schedule (plain Deployment
# modes above, or Knative Service — same in-cluster Service name as fullnameOverride)
workload:
  mode: longPolling

cronjob:
  enabled: true
  # Every hour at minute 0 (UTC). Override for your timezone or frequency.
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  suspend: false

deployment:
  replicas: 1
  resources: {}
  # nodeSelector: {}
  # tolerations: []
  # affinity: {}

# External HTTP is off by default (ClusterIP Service only). Enable for public webhook / HTTP ingress.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix

# SQLite: emptyDir (ephemeral) or PVC
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

# --- App configuration (maps to env)
config:
  gameId: otoslotto
  defaultLocale: hu
  logFormat: text
  logLevel: info
  telegramWebhookPath: /telegram/webhook
  # Public HTTPS base (no trailing slash) for Telegram webhook — required for production Knative
  webhookUrl: ""
  # If set, used as DATABASE_URL (default below uses /data for persistent volume layout)
  databaseUrl: ""
  otoslottoResultJsonUrl: ""
  eurojackpotResultJsonUrl: ""
  otel:
    serviceName: szerencsejatek-telegram-bot
    serviceVersion: "0.2.0"
    exporterOtlpEndpoint: ""

# Telegram Bot API token — prefer existing Secret
telegram:
  existingSecret: ""
  existingSecretKey: token
  # If existingSecret is empty, set botToken to create a Secret (avoid in Git; use --set-file or Sealed Secrets)
  botToken: ""

# Optional webhook secret (X-Telegram-Bot-Api-Secret-Token)
telegramWebhook:
  existingSecret: ""
  existingSecretKey: secret

# Knative Eventing: Broker + Trigger → this Service (CloudEvents pipeline)
eventing:
  enabled: false
  brokerName: default
