name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.7

      - name: Deno (fmt, lint, test)
        run: deno task check

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Helm lint
        run: deno task helm:lint

      - name: Docker build
        run: docker build -f deploy/docker/Dockerfile .
